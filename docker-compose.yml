# Stack para Docker Swarm (nodo único). Deploy:
#
#   set -a; source .env; set +a          # variables no-secretas
#   docker stack config -c docker-compose.yml | docker stack deploy -c - nexrad
#
# (docker stack deploy no interpola ${VARS}; docker stack config sí.)
#
# Secrets (una vez):
#   printf '%s' "$R2_ACCESS_KEY_ID"     | docker secret create nexrad_r2_access_key_id -
#   printf '%s' "$R2_SECRET_ACCESS_KEY" | docker secret create nexrad_r2_secret_access_key -
#   printf '%s' "$CLOUDFLARE_API_TOKEN" | docker secret create nexrad_cf_api_token -
#
# Monitor de frescura y sweep de retención viven fuera del stack, en el
# Worker de Cloudflare `nexrad-l3-ops` (workers/ops/) — un monitor dentro
# del VPS no puede alertar cuando el VPS muere. Viento (GFS) y rayos (GLM)
# SÍ corren aquí (services `wind`/`lightning`): vivían en los Workers
# `nexrad-l3-wind`/`nexrad-l3-lightning`, pero el plan Free de Workers no
# permite subir `limits.cpu_ms` y el parse HDF5 de GLM lo excede casi
# siempre (ver workers/lightning/README.md). `ops` no necesita cambios:
# lee wind_grids/lightning_buckets por SQL D1 + API R2, sin importarle
# quién escribió las filas.

services:
  poller:
    image: ghcr.io/vladimir1284/nexrad-l3-pipeline:${IMAGE_TAG:-latest}
    command: ["poll", "/data/incoming", "--interval", "60"]
    environment:
      NEXRAD_SITES: ${NEXRAD_SITES:-AMX,BYX,JUA}
      # NEXRAD_PRODUCTS: sin definir = todos los registrados (F4: N0B)
    volumes:
      - incoming:/data/incoming
    healthcheck:
      test: ["CMD", "l3proc", "health", "--heartbeat", "/data/incoming/.poll_heartbeat", "--max-age", "300"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256M

  processor:
    image: ghcr.io/vladimir1284/nexrad-l3-pipeline:${IMAGE_TAG:-latest}
    command: ["watch", "/data/incoming"]
    environment:
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      D1_DATABASE_ID: ${D1_DATABASE_ID}
      R2_ACCESS_KEY_ID_FILE: /run/secrets/nexrad_r2_access_key_id
      R2_SECRET_ACCESS_KEY_FILE: /run/secrets/nexrad_r2_secret_access_key
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/nexrad_cf_api_token
    secrets:
      - nexrad_r2_access_key_id
      - nexrad_r2_secret_access_key
      - nexrad_cf_api_token
    volumes:
      - incoming:/data/incoming
    healthcheck:
      # Solo heartbeat: reiniciar por backlog es contraproducente (el reinicio
      # no vacía nada y pierde el arranque). El backlog atrasado lo detecta el
      # monitor de frescura, que es alerta y no reinicio.
      test: ["CMD", "l3proc", "health", "--heartbeat", "/data/incoming/.heartbeat", "--max-age", "300"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 1G

  wind:
    image: ghcr.io/vladimir1284/nexrad-l3-pipeline:${IMAGE_TAG:-latest}
    command: ["wind", "--interval", "3600", "--lookahead", "4", "--heartbeat", "/tmp/.wind_heartbeat"]
    environment:
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      D1_DATABASE_ID: ${D1_DATABASE_ID}
      R2_ACCESS_KEY_ID_FILE: /run/secrets/nexrad_r2_access_key_id
      R2_SECRET_ACCESS_KEY_FILE: /run/secrets/nexrad_r2_secret_access_key
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/nexrad_cf_api_token
    secrets:
      - nexrad_r2_access_key_id
      - nexrad_r2_secret_access_key
      - nexrad_cf_api_token
    healthcheck:
      test: ["CMD", "l3proc", "health", "--heartbeat", "/tmp/.wind_heartbeat", "--max-age", "4200"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M

  lightning:
    image: ghcr.io/vladimir1284/nexrad-l3-pipeline:${IMAGE_TAG:-latest}
    command: ["lightning", "--interval", "60", "--heartbeat", "/tmp/.lightning_heartbeat"]
    environment:
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      D1_DATABASE_ID: ${D1_DATABASE_ID}
      R2_ACCESS_KEY_ID_FILE: /run/secrets/nexrad_r2_access_key_id
      R2_SECRET_ACCESS_KEY_FILE: /run/secrets/nexrad_r2_secret_access_key
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/nexrad_cf_api_token
    secrets:
      - nexrad_r2_access_key_id
      - nexrad_r2_secret_access_key
      - nexrad_cf_api_token
    healthcheck:
      test: ["CMD", "l3proc", "health", "--heartbeat", "/tmp/.lightning_heartbeat", "--max-age", "300"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 512M

volumes:
  incoming:

secrets:
  nexrad_r2_access_key_id:
    external: true
  nexrad_r2_secret_access_key:
    external: true
  nexrad_cf_api_token:
    external: true
