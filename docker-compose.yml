# Stack para Docker Swarm (nodo único). Deploy:
#
#   set -a; source .env; set +a          # variables no-secretas
#   docker stack config -c docker-compose.yml | docker stack deploy -c - nexrad
#
# (docker stack deploy no interpola ${VARS}; docker stack config sí.)
#
# Secrets (una vez):
#   printf '%s' "$R2_ACCESS_KEY_ID"     | docker secret create nexrad_r2_access_key_id -
#   printf '%s' "$R2_SECRET_ACCESS_KEY" | docker secret create nexrad_r2_secret_access_key -
#   printf '%s' "$CLOUDFLARE_API_TOKEN" | docker secret create nexrad_cf_api_token -
#   printf '%s' "$TELEGRAM_BOT_TOKEN"   | docker secret create nexrad_telegram_bot_token -
#   printf '%s' "$TELEGRAM_CHAT_ID"     | docker secret create nexrad_telegram_chat_id -
# (los de Telegram pueden crearse con contenido vacío: el monitor pasa a solo-log)

services:
  poller:
    image: ghcr.io/vladimir1284/nexrad-l3-pipeline:${IMAGE_TAG:-latest}
    command: ["poll", "/data/incoming", "--interval", "60"]
    environment:
      NEXRAD_SITES: ${NEXRAD_SITES:-AMX,BYX,JUA}
      # NEXRAD_PRODUCTS: sin definir = todos los registrados (F4: N0B)
    volumes:
      - incoming:/data/incoming
    healthcheck:
      test: ["CMD", "l3proc", "health", "--heartbeat", "/data/incoming/.poll_heartbeat", "--max-age", "300"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256M

  processor:
    image: ghcr.io/vladimir1284/nexrad-l3-pipeline:${IMAGE_TAG:-latest}
    command: ["watch", "/data/incoming"]
    environment:
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      D1_DATABASE_ID: ${D1_DATABASE_ID}
      R2_ACCESS_KEY_ID_FILE: /run/secrets/nexrad_r2_access_key_id
      R2_SECRET_ACCESS_KEY_FILE: /run/secrets/nexrad_r2_secret_access_key
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/nexrad_cf_api_token
    secrets:
      - nexrad_r2_access_key_id
      - nexrad_r2_secret_access_key
      - nexrad_cf_api_token
    volumes:
      - incoming:/data/incoming
    healthcheck:
      # Solo heartbeat: reiniciar por backlog es contraproducente (el reinicio
      # no vacía nada y pierde el arranque). El backlog atrasado lo detecta el
      # monitor de frescura, que es alerta y no reinicio.
      test: ["CMD", "l3proc", "health", "--heartbeat", "/data/incoming/.heartbeat", "--max-age", "300"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 1G

  sweep:
    image: ghcr.io/vladimir1284/nexrad-l3-pipeline:${IMAGE_TAG:-latest}
    command: ["sweep", "--interval", "3600", "--window-hours", "72", "--fix", "--heartbeat", "/tmp/heartbeat"]
    environment:
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      D1_DATABASE_ID: ${D1_DATABASE_ID}
      R2_ACCESS_KEY_ID_FILE: /run/secrets/nexrad_r2_access_key_id
      R2_SECRET_ACCESS_KEY_FILE: /run/secrets/nexrad_r2_secret_access_key
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/nexrad_cf_api_token
    secrets:
      - nexrad_r2_access_key_id
      - nexrad_r2_secret_access_key
      - nexrad_cf_api_token
    healthcheck:
      test: ["CMD", "l3proc", "health", "--heartbeat", "/tmp/heartbeat", "--max-age", "7200"]
      interval: 300s
      timeout: 10s
      retries: 3
      start_period: 300s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256M

  monitor:
    image: ghcr.io/vladimir1284/nexrad-l3-pipeline:${IMAGE_TAG:-latest}
    command: ["monitor", "--interval", "300", "--max-age", "30", "--heartbeat", "/tmp/heartbeat"]
    environment:
      NEXRAD_SITES: ${NEXRAD_SITES:-AMX,BYX,JUA}
      R2_ENDPOINT: ${R2_ENDPOINT}
      R2_BUCKET: ${R2_BUCKET}
      CLOUDFLARE_ACCOUNT_ID: ${CLOUDFLARE_ACCOUNT_ID}
      D1_DATABASE_ID: ${D1_DATABASE_ID}
      R2_ACCESS_KEY_ID_FILE: /run/secrets/nexrad_r2_access_key_id
      R2_SECRET_ACCESS_KEY_FILE: /run/secrets/nexrad_r2_secret_access_key
      CLOUDFLARE_API_TOKEN_FILE: /run/secrets/nexrad_cf_api_token
      TELEGRAM_BOT_TOKEN_FILE: /run/secrets/nexrad_telegram_bot_token
      TELEGRAM_CHAT_ID_FILE: /run/secrets/nexrad_telegram_chat_id
    secrets:
      - nexrad_r2_access_key_id
      - nexrad_r2_secret_access_key
      - nexrad_cf_api_token
      - nexrad_telegram_bot_token
      - nexrad_telegram_chat_id
    healthcheck:
      test: ["CMD", "l3proc", "health", "--heartbeat", "/tmp/heartbeat", "--max-age", "900"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 120s
    deploy:
      replicas: 1
      restart_policy:
        condition: any
        delay: 5s
      resources:
        limits:
          memory: 256M

volumes:
  incoming:

secrets:
  nexrad_r2_access_key_id:
    external: true
  nexrad_r2_secret_access_key:
    external: true
  nexrad_cf_api_token:
    external: true
  nexrad_telegram_bot_token:
    external: true
  nexrad_telegram_chat_id:
    external: true
